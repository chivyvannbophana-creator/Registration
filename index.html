
<html>
<head>
  <title>Student Registration Form </title>
</head>
<body>
  <center>
  <h2>Student Registration Form</h2>
  <Form>
  
  
   <label> Full Name:  </label><br>
   <input type="Fullname" name="fullname" >  <br><br>
   
   <label> Email:</label><br>
   <input type="Email" name="Email" >  <br><br>

   <label> Password:  </label><br>
   <input type="Password" name="password" >  <br><br>
   
   <label> Phone Number:  </label><br>
   <input type="Phone Number" name="Phone Number" >  <br><br>
   
   <label> Gender:  </label><br>
   <input type="gender" name="gender" >  <br><br>
   
   <label>Gender:</label><br>
   <input type="radio" name="gender" Value="Female">Female
   <input type="radio" name="gender" Value="Male">Male
   <input type="radio" name="gender" Value="Other">Other
   <br><br>
   <label>Date of Birth:</label><br>
   <input type="date"name"dob"><br><br>
   
   <label>Department:</label><br>
   <select name="department">
   <option>BIS</option>
   <option>IB</option>
   <option>HMT</option>
   <option>A&F</option>
   <option>LSCM</option>
 </select>
 <br><br>
 
   <label>Skills:</label><br>
   <input type="checkbox"name="skills" value="HTML">HTML 
   <input type="checkbox"name="skills" value="Accounting">Accounting
   <input type="checkbox"name="skills" value="Finance">Finance
   <input type="checkbox"name="skills" value="Data science">Data science
   <br><br>
   
   <label>Address:</label> <br>
   <textarea name="address" rows="4" cos="30"> </textarea>
   <br> <br>
   
   <input type="submit"name"skills"value="Register">
   <input type="reset"name"skills"value="Clear">
  
   
   </form>
   </center>
 </body>
 </html>
